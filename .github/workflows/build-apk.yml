name: Build APK Android
on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Deploy GitHub Pages"]
    types: [completed]
permissions:
  contents: write
jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install -g @bubblewrap/cli@latest
      - name: Gerar keystore
        run: |
          keytool -genkey -v -keystore android.keystore -alias app \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass mypassword123 -keypass mypassword123 \
            -dname "CN=Assistente Juridico, OU=App, O=App, L=BR, ST=BR, C=BR"
      - name: Criar configuração TWA
        run: |
          cat > twa-manifest.json << 'TWAEOF'
          {
            "packageId": "com.maikonadvogadomgalt.iara4",
            "host": "maikonadvogadomg-alt.github.io",
            "name": "Assistente Juridico",
            "launcherName": "Juridico",
            "display": "standalone",
            "themeColor": "#6366f1",
            "navigationColor": "#6366f1",
            "backgroundColor": "#0f172a",
            "enableNotifications": false,
            "startUrl": "/iara-4/",
            "iconUrl": "https://maikonadvogadomg-alt.github.io/iara-4/icon-192.png",
            "maskableIconUrl": "https://maikonadvogadomg-alt.github.io/iara-4/icon-192.png",
            "appVersion": "1.0.0",
            "appVersionCode": 1,
            "signingKey": { "path": "../android.keystore", "alias": "app" },
            "shortcuts": [],
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://maikonadvogadomg-alt.github.io/iara-4/manifest.json",
            "fallbackType": "customtabs",
            "features": {},
            "minSdkVersion": 21,
            "orientation": "default",
            "fullScopeUrl": "https://maikonadvogadomg-alt.github.io/iara-4/"
          }
          TWAEOF
      - name: Build APK
        run: |
          bubblewrap init --manifest twa-manifest.json --directory ./twa-app
          cd twa-app && bubblewrap build
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: mypassword123
          BUBBLEWRAP_KEY_PASSWORD: mypassword123
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: APK-Android
          path: "**/*.apk"
          retention-days: 30
